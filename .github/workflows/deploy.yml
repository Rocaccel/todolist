name: Deploy Todo List

on:
  push:
    branches:
      - main  # или название вашей ветки

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Secrets
        run: |
          sed -i "s|PROCESS_ENV_FIREBASE_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_DATABASE_URL|${{ secrets.FIREBASE_DATABASE_URL }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_MESSAGING_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" index.html
          sed -i "s|PROCESS_ENV_FIREBASE_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
