<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий список дел</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">
    
    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">📋 Общий список</h1>
        
        <div class="mb-6">
            <p class="text-xs text-gray-500 mb-1">Поделитесь этой ссылкой:</p>
            <div id="urlDisplay" class="text-[10px] font-mono bg-blue-50 p-2 rounded border border-blue-100 break-all text-blue-600 cursor-pointer hover:bg-blue-100 transition" title="Нажмите, чтобы скопировать"></div>
        </div>
        
        <div class="flex mb-6">
            <input id="todoInput" type="text" 
                   class="flex-1 border border-gray-300 p-2 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-400" 
                   placeholder="Что нужно сделать?">
            <button id="addBtn" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-r-lg font-bold transition">
                +
            </button>
        </div>

        <ul id="todoList" class="space-y-3">
            </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgWl9Af-MMcB7ztdp_-MmIQI0Oiwt-pY",
  authDomain: "todolist-d0cdf.firebaseapp.com",
  databaseURL: "https://todolist-d0cdf-default-rtdb.firebaseio.com",
  projectId: "todolist-d0cdf",
  storageBucket: "todolist-d0cdf.firebasestorage.app",
  messagingSenderId: "589225329978",
  appId: "1:589225329978:web:1112cd984c66914aafbc03"
};


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let listId = window.location.hash.substring(1);
        if (!listId) {
            listId = Math.random().toString(36).substring(2, 10);
            window.location.hash = listId;
        }
        
        const urlDisplay = document.getElementById('urlDisplay');
        urlDisplay.innerText = window.location.href;
        urlDisplay.onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            const oldText = urlDisplay.innerText;
            urlDisplay.innerText = "Скопировано!";
            setTimeout(() => urlDisplay.innerText = oldText, 1000);
        };

        const listRef = ref(db, 'lists/' + listId);
        const input = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const listContainer = document.getElementById('todoList');

        Sortable.create(listContainer, {
            animation: 150,
            handle: '.drag-handle',
            onEnd: function () {
                const items = listContainer.querySelectorAll('li');
                items.forEach((li, index) => {
                    const id = li.getAttribute('data-id');
                    update(ref(db, `lists/${listId}/${id}`), { order: index });
                });
            }
        });

        const addTodo = () => {
            const text = input.value.trim();
            if (!text) return;
            const currentCount = listContainer.children.length;
            push(listRef, { 
                text: text, 
                done: false, 
                order: currentCount,
                createdAt: Date.now() 
            });
            input.value = '';
        };

        addBtn.onclick = addTodo;
        input.onkeypress = (e) => { if (e.key === 'Enter') addTodo(); };

        window.toggleTodo = (id, currentStatus) => {
            update(ref(db, `lists/${listId}/${id}`), { done: !currentStatus });
        };

        window.deleteTodo = (id) => {
            remove(ref(db, `lists/${listId}/${id}`));
        };

        onValue(listRef, (snapshot) => {
            listContainer.innerHTML = '';
            const data = snapshot.val();
            
            if (!data) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 py-4">Список пока пуст</p>';
                return;
            }

            const sortedItems = Object.keys(data)
                .map(id => ({ id, ...data[id] }))
                .sort((a, b) => (a.order || 0) - (b.order || 0));

            sortedItems.forEach(item => {
                const li = document.createElement('li');
                li.setAttribute('data-id', item.id);
                li.className = `flex justify-between items-center p-3 rounded-lg border transition ${item.done ? 'bg-gray-50 border-gray-200' : 'bg-white border-blue-100 shadow-sm'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1">
                        <div class="drag-handle cursor-move text-gray-300 hover:text-blue-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="flex items-center gap-3 flex-1 group" onclick="event.stopPropagation(); toggleTodo('${item.id}', ${item.done})">
                            <div class="w-6 h-6 border-2 rounded flex items-center justify-center transition-colors ${item.done ? 'bg-green-500 border-green-500' : 'border-gray-300 group-hover:border-blue-400'}">
                                ${item.done ? '<span class="text-white text-xs">✓</span>' : ''}
                            </div>
                            <span class="${item.done ? 'line-through text-gray-400' : 'text-gray-700'} font-medium select-none">${item.text}</span>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); deleteTodo('${item.id}')" class="ml-2 text-gray-300 hover:text-red-500 p-1 rounded hover:bg-red-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                listContainer.appendChild(li);
            });
        });
    </script>
</body>
</html>
