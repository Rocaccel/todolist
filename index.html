<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий список дел</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">
    
    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">📋 Общий список</h1>
        
        <div class="mb-6">
            <p class="text-xs text-gray-500 mb-1">Поделитесь этой ссылкой:</p>
            <div id="urlDisplay" class="text-[10px] font-mono bg-blue-50 p-2 rounded border border-blue-100 break-all text-blue-600 cursor-pointer hover:bg-blue-100 transition" title="Нажмите, чтобы скопировать"></div>
        </div>
        
        <div class="flex mb-6">
            <input id="todoInput" type="text" 
                   class="flex-1 border border-gray-300 p-2 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-400" 
                   placeholder="Что нужно сделать?">
            <button id="addBtn" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-r-lg font-bold transition">
                +
            </button>
        </div>

        <ul id="todoList" class="space-y-3">
            </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "PROCESS_ENV_FIREBASE_API_KEY",
  authDomain: "PROCESS_ENV_FIREBASE_AUTH_DOMAIN",
  databaseURL: "PROCESS_ENV_FIREBASE_DATABASE_URL",
  projectId: "PROCESS_ENV_FIREBASE_PROJECT_ID",
  storageBucket: "PROCESS_ENV_FIREBASE_STORAGE_BUCKET",
  messagingSenderId: "PROCESS_ENV_FIREBASE_MESSAGING_SENDER_ID",
  appId: "PROCESS_ENV_FIREBASE_APP_ID"
};


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let listId = window.location.hash.substring(1);
        if (!listId) {
            listId = Math.random().toString(36).substring(2, 10);
            window.location.hash = listId;
        }
        
        const urlDisplay = document.getElementById('urlDisplay');
        urlDisplay.innerText = window.location.href;
        urlDisplay.onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            const oldText = urlDisplay.innerText;
            urlDisplay.innerText = "Скопировано!";
            setTimeout(() => urlDisplay.innerText = oldText, 1000);
        };

        const listRef = ref(db, 'lists/' + listId);
        const input = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const listContainer = document.getElementById('todoList');

        Sortable.create(listContainer, {
            animation: 150,
            handle: '.drag-handle',
            onEnd: function () {
                const items = listContainer.querySelectorAll('li');
                items.forEach((li, index) => {
                    const id = li.getAttribute('data-id');
                    update(ref(db, `lists/${listId}/${id}`), { order: index });
                });
            }
        });

        const addTodo = () => {
            const text = input.value.trim();
            if (!text) return;
            const currentCount = listContainer.children.length;
            push(listRef, { 
                text: text, 
                done: false, 
                order: currentCount,
                createdAt: Date.now() 
            });
            input.value = '';
        };

        addBtn.onclick = addTodo;
        input.onkeypress = (e) => { if (e.key === 'Enter') addTodo(); };

        window.toggleTodo = (id, currentStatus) => {
            update(ref(db, `lists/${listId}/${id}`), { done: !currentStatus });
        };

        window.deleteTodo = (id) => {
            remove(ref(db, `lists/${listId}/${id}`));
        };

        window.editTodo = (id, oldText) => {
            const li = document.querySelector(`li[data-id="${id}"]`);
            const textSpan = li.querySelector('.todo-text');
            const inputEdit = document.createElement('input');
            inputEdit.type = 'text';
            inputEdit.value = oldText;
            inputEdit.className = 'flex-1 border-b border-blue-400 focus:outline-none bg-transparent text-gray-700 font-medium';
            
            const saveEdit = () => {
                const newText = inputEdit.value.trim();
                if (newText && newText !== oldText) {
                    update(ref(db, `lists/${listId}/${id}`), { text: newText });
                } else {
                    textSpan.innerText = oldText;
                    inputEdit.replaceWith(textSpan);
                }
            };

            inputEdit.onblur = saveEdit;
            inputEdit.onkeypress = (e) => { if (e.key === 'Enter') saveEdit(); };
            
            textSpan.replaceWith(inputEdit);
            inputEdit.focus();
        };

        onValue(listRef, (snapshot) => {
            listContainer.innerHTML = '';
            const data = snapshot.val();
            
            if (!data) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 py-4">Список пока пуст</p>';
                return;
            }

            const sortedItems = Object.keys(data)
                .map(id => ({ id, ...data[id] }))
                .sort((a, b) => (a.order || 0) - (b.order || 0));

            sortedItems.forEach(item => {
                const li = document.createElement('li');
                li.setAttribute('data-id', item.id);
                li.className = `flex justify-between items-center p-3 rounded-lg border transition ${item.done ? 'bg-gray-50 border-gray-200' : 'bg-white border-blue-100 shadow-sm'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <div class="drag-handle cursor-move text-gray-300 hover:text-blue-500 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="flex items-center gap-3 flex-1 group min-w-0" onclick="event.stopPropagation(); toggleTodo('${item.id}', ${item.done})">
                            <div class="w-6 h-6 border-2 rounded flex items-center justify-center flex-shrink-0 transition-colors ${item.done ? 'bg-green-500 border-green-500' : 'border-gray-300 group-hover:border-blue-400'}">
                                ${item.done ? '<span class="text-white text-xs">✓</span>' : ''}
                            </div>
                            <span class="todo-text truncate ${item.done ? 'line-through text-gray-400' : 'text-gray-700'} font-medium select-none">${item.text}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="event.stopPropagation(); editTodo('${item.id}', '${item.text.replace(/'/g, "\\'")}')" class="text-gray-300 hover:text-blue-500 p-1 rounded hover:bg-blue-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                            </svg>
                        </button>
                        <button onclick="event.stopPropagation(); deleteTodo('${item.id}')" class="text-gray-300 hover:text-red-500 p-1 rounded hover:bg-red-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        });
    </script>
</body>
</html>
